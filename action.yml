name: EvalShift
description: Run EvalShift, push a hosted run, update PR comments, and gate on regressions.

branding:
  icon: bar-chart-2
  color: purple

inputs:
  token:
    description: Hosted EvalShift API token.
    required: true
  host:
    description: Hosted EvalShift API base URL.
    required: false
    default: https://api.evalshift.dev
  config:
    description: Path to evalshift.yaml.
    required: false
    default: evalshift.yaml
  suite:
    description: Path to golden JSONL suite.
    required: false
    default: golden.jsonl
  evalshift-version:
    description: EvalShift CLI version to install.
    required: false
    default: "0.9.0"
  python-version:
    description: Python version for the EvalShift CLI.
    required: false
    default: "3.14"
  fail-on:
    description: "Gating mode: never, regression, or any-slice-regression."
    required: false
    default: regression
  branch:
    description: Candidate branch override. Auto-detected when omitted.
    required: false
    default: ""
  base-branch:
    description: Baseline branch override. Auto-detected when omitted.
    required: false
    default: ""
  create-project:
    description: Whether evalshift push may auto-create a missing hosted project.
    required: false
    default: "true"
  comment:
    description: Whether to create or update the EvalShift PR comment.
    required: false
    default: "true"
  github-token:
    description: Token used for PR comments and commit status.
    required: false
    default: ""

outputs:
  run_url:
    description: Hosted run URL.
    value: ${{ steps.run.outputs.run_url }}
  diff_url:
    description: Hosted diff URL when a compatible baseline exists.
    value: ${{ steps.run.outputs.diff_url }}
  run_id:
    description: EvalShift run id.
    value: ${{ steps.run.outputs.run_id }}
  regression_count:
    description: Number of regressed examples in the hosted diff.
    value: ${{ steps.run.outputs.regression_count }}
  conclusion:
    description: success or failure.
    value: ${{ steps.run.outputs.conclusion }}

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v7
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install EvalShift
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install "evalshift==${{ inputs.evalshift-version }}"

    - name: Run EvalShift
      id: run
      shell: bash
      env:
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_HOST: ${{ inputs.host }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_SUITE: ${{ inputs.suite }}
        INPUT_EVALSHIFT_VERSION: ${{ inputs.evalshift-version }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_BRANCH: ${{ inputs.branch }}
        INPUT_BASE_BRANCH: ${{ inputs.base-branch }}
        INPUT_CREATE_PROJECT: ${{ inputs.create-project }}
        INPUT_COMMENT: ${{ inputs.comment }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token || github.token }}
      run: python "$GITHUB_ACTION_PATH/scripts/evalshift_action.py"
